name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint (Flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Flake8
        run: pip install flake8
      - name: Rodar Flake8
        run: flake8 .

  security:
    name: Segurança (Bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências do projeto
        run: pip install -r requirements.txt
      - name: Bandit — análise estática de segurança
        run: pip install bandit && bandit -r . -c pyproject.toml
      - name: pip-audit — vulnerabilidades em dependências
        run: pip install pip-audit && pip-audit
        continue-on-error: true

  test:
    name: Testes (Pytest + cobertura)
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: dummy-project
      GEMINI_API_KEY: dummy-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Rodar testes com cobertura
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=80
      - name: Upload cobertura
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true
