[tool.bandit]
exclude_dirs = ["tests", "venv", ".claude", "data"]
skips = ["B608"]

[tool.coverage.run]
source = [
    "agent_identity",
    "charts",
    "config",
    "guardrails",
    "llm",
    "memory",
    "styles",
    "utils",
    "utils_cache"
]
omit = [
    "venv/*",
    "tests/*",
    ".web/*",
    "components.py",
    "app.py"
]

[tool.coverage.report]
fail_under = 80
exclude_lines = [
    "if __name__ == .__main__.:",
    "pragma: no cover",
]
