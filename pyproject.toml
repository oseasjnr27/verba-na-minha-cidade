[tool.bandit]
exclude_dirs = ["tests", "venv", ".claude", "data"]
skips = ["B608"]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "venv/*",
    "app2.py",
    "test.py",
    "test_setup.py",
]

[tool.coverage.report]
fail_under = 80
exclude_lines = [
    "if __name__ == .__main__.:",
    "pragma: no cover",
]
